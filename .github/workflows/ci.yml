name: CI – RiskIntelligenceEngine

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install flake8
        run: pip install flake8
      - name: Lint all services
        run: |
          flake8 services/ common/ \
            --max-line-length=120 \
            --exclude=services/*/app/models/saved,*/__pycache__ \
            --count --statistics

  test:
    name: Tests – ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - client-risk-api
          - transaction-risk-api
          - feature-engineering
          - rule-engine
          - ml-scoring
          - graph-intelligence
          - risk-aggregation
          - alert-service
          - audit-service
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        working-directory: services/${{ matrix.service }}
        run: pip install -r requirements.txt
      - name: Install common library
        run: pip install -e common/
      - name: Run tests
        working-directory: services/${{ matrix.service }}
        run: python -m pytest tests/ -v --tb=short --cov=app --cov-report=xml
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: services/${{ matrix.service }}/coverage.xml
          flags: ${{ matrix.service }}

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push images
        run: |
          SERVICES=(client-risk-api transaction-risk-api feature-engineering rule-engine ml-scoring graph-intelligence risk-aggregation alert-service audit-service)
          for svc in "${SERVICES[@]}"; do
            docker buildx build \
              --platform linux/amd64,linux/arm64 \
              --push \
              -t ghcr.io/aniruddhamk/risk-$svc:${{ github.sha }} \
              -t ghcr.io/aniruddhamk/risk-$svc:latest \
              services/$svc/
          done

  security-scan:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          format: table
