events {
    worker_processes auto;
}

http {
    upstream client_risk_api {
        server client-risk-api:8001;
    }
    upstream transaction_risk_api {
        server transaction-risk-api:8002;
    }
    upstream feature_engineering {
        server feature-engineering:8003;
    }
    upstream rule_engine {
        server rule-engine:8004;
    }
    upstream ml_scoring {
        server ml-scoring:8005;
    }
    upstream graph_intelligence {
        server graph-intelligence:8006;
    }
    upstream risk_aggregation {
        server risk-aggregation:8007;
    }
    upstream alert_service {
        server alert-service:8008;
    }
    upstream audit_service {
        server audit-service:8009;
    }

    server {
        listen 8000;
        server_name _;

        # Health check
        location /health {
            proxy_pass http://client_risk_api/health;
        }

        # Client Risk API
        location /api/v1/client-risk/ {
            proxy_pass http://client_risk_api/api/v1/client-risk/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 60s;
        }

        # Transaction Risk API
        location /api/v1/transaction-risk/ {
            proxy_pass http://transaction_risk_api/api/v1/transaction-risk/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Feature Engineering
        location /api/v1/features/ {
            proxy_pass http://feature_engineering/api/v1/features/;
            proxy_set_header Host $host;
        }

        # Rule Engine
        location /api/v1/rules/ {
            proxy_pass http://rule_engine/api/v1/rules/;
            proxy_set_header Host $host;
        }

        # ML Scoring
        location /api/v1/ml/ {
            proxy_pass http://ml_scoring/api/v1/ml/;
            proxy_set_header Host $host;
        }

        # Graph Intelligence
        location /api/v1/graph/ {
            proxy_pass http://graph_intelligence/api/v1/graph/;
            proxy_set_header Host $host;
        }

        # Risk Aggregation
        location /api/v1/risk/ {
            proxy_pass http://risk_aggregation/api/v1/risk/;
            proxy_set_header Host $host;
        }

        # Alert Service
        location /api/v1/alerts/ {
            proxy_pass http://alert_service/api/v1/alerts/;
            proxy_set_header Host $host;
        }

        # Audit Service
        location /api/v1/audit/ {
            proxy_pass http://audit_service/api/v1/audit/;
            proxy_set_header Host $host;
        }
    }
}
